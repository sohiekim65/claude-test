<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 사주팔자 - 운명을 읽다</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500&display=swap');

    :root {
      --deep-red: #8B1A1A;
      --gold: #C9973A;
      --light-gold: #F0D080;
      --dark-bg: #0D0A07;
      --card-bg: #1A1208;
      --text-main: #F5E6C8;
      --text-sub: #C8A96E;
      --border: #4A3010;
      --input-bg: #120E06;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background-color: var(--dark-bg);
      color: var(--text-main);
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse at top, #1a0a00 0%, transparent 60%),
        url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23C9973A' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }

    /* ── Header ── */
    .header {
      text-align: center;
      padding: 48px 20px 32px;
      position: relative;
    }
    .header::after {
      content: '';
      display: block;
      width: 120px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 16px auto 0;
    }
    .header .symbol {
      font-size: 48px;
      margin-bottom: 12px;
      filter: drop-shadow(0 0 12px rgba(201,151,58,0.6));
    }
    .header h1 {
      font-family: 'Noto Serif KR', serif;
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 700;
      color: var(--light-gold);
      letter-spacing: 0.15em;
      text-shadow: 0 0 20px rgba(201,151,58,0.4);
    }
    .header p {
      margin-top: 8px;
      color: var(--text-sub);
      font-size: 0.95rem;
      letter-spacing: 0.05em;
    }

    /* ── Main container ── */
    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 20px 60px;
    }

    /* ── Card ── */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px 32px;
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }
    .card-title {
      font-family: 'Noto Serif KR', serif;
      font-size: 1.05rem;
      color: var(--gold);
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-title .icon { font-size: 1.2rem; }

    /* ── Form elements ── */
    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block;
      font-size: 0.85rem;
      color: var(--text-sub);
      margin-bottom: 6px;
      letter-spacing: 0.03em;
    }
    .form-group input,
    .form-group select {
      width: 100%;
      padding: 11px 14px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-main);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.95rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
    }
    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(201,151,58,0.15);
    }
    .form-group input::placeholder { color: #5a4a2a; }
    .form-group select option { background: #1a1208; }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    @media (max-width: 480px) {
      .form-row { grid-template-columns: 1fr; }
      .card { padding: 20px 18px; }
    }

    /* API key toggle */
    .api-key-wrapper { position: relative; }
    .api-key-wrapper input { padding-right: 44px; }
    .toggle-pw {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-sub);
      font-size: 1rem;
      padding: 4px;
      line-height: 1;
    }
    .toggle-pw:hover { color: var(--gold); }

    /* ── Submit button ── */
    .btn-submit {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #7a1515, #C9973A);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: 'Noto Serif KR', serif;
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }
    .btn-submit:hover:not(:disabled) {
      opacity: 0.92;
      box-shadow: 0 4px 20px rgba(201,151,58,0.35);
      transform: translateY(-1px);
    }
    .btn-submit:active:not(:disabled) { transform: translateY(0); }
    .btn-submit:disabled { opacity: 0.55; cursor: not-allowed; }
    .btn-submit .btn-inner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    /* ── Loading ── */
    .loader {
      display: none;
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Result ── */
    #result-section { display: none; }
    .result-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .result-header h2 {
      font-family: 'Noto Serif KR', serif;
      font-size: 1.25rem;
      color: var(--light-gold);
    }
    .result-body {
      line-height: 1.9;
      font-size: 0.97rem;
      color: var(--text-main);
      white-space: pre-wrap;
      word-break: keep-all;
    }
    .result-body strong { color: var(--light-gold); }

    /* Divider ornament */
    .divider {
      text-align: center;
      color: var(--gold);
      font-size: 1.1rem;
      letter-spacing: 0.5em;
      margin: 6px 0 18px;
      opacity: 0.6;
    }

    /* ── Error ── */
    .error-box {
      display: none;
      background: rgba(139,26,26,0.2);
      border: 1px solid #8B1A1A;
      border-radius: 8px;
      padding: 14px 18px;
      color: #f8a0a0;
      font-size: 0.9rem;
      margin-top: 14px;
      line-height: 1.6;
    }

    /* ── Info tooltip ── */
    .helper-text {
      font-size: 0.78rem;
      color: #5a4a2a;
      margin-top: 5px;
    }

    /* ── Footer ── */
    .footer {
      text-align: center;
      padding: 24px 20px;
      color: #3a2a10;
      font-size: 0.78rem;
      border-top: 1px solid #1a1208;
    }

    /* Fade-in animation */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.5s ease forwards; }
  </style>
</head>
<body>

  <!-- ── HEADER ── -->
  <div class="header">
    <div class="symbol">☯</div>
    <h1>AI 사주팔자</h1>
    <p>생년월일과 태어난 시간으로 운명을 읽어드립니다</p>
  </div>

  <div class="container">

    <!-- ── API KEY CARD ── -->
    <div class="card">
      <div class="card-title"><span class="icon">🔑</span> Gemini API 키 설정</div>
      <div class="form-group">
        <label for="apiKey">Google Gemini API 키</label>
        <div class="api-key-wrapper">
          <input type="password" id="apiKey" placeholder="AIza..." autocomplete="off" />
          <button class="toggle-pw" onclick="toggleApiKey()" title="보기/숨기기">👁</button>
        </div>
        <p class="helper-text">
          API 키는 브라우저에서만 사용되며 어디에도 전송되거나 저장되지 않습니다.<br>
          키가 없으신 경우 <a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener" style="color:var(--gold);">Google AI Studio</a>에서 무료로 발급받으세요.
        </p>
      </div>
    </div>

    <!-- ── BIRTH INFO CARD ── -->
    <div class="card">
      <div class="card-title"><span class="icon">📅</span> 생년월일 및 태어난 시간</div>

      <div class="form-row">
        <div class="form-group">
          <label for="birthYear">출생 연도</label>
          <input type="number" id="birthYear" placeholder="예) 1990" min="1900" max="2025" />
        </div>
        <div class="form-group">
          <label for="birthMonth">출생 월</label>
          <select id="birthMonth">
            <option value="">월 선택</option>
            <option value="1">1월</option><option value="2">2월</option>
            <option value="3">3월</option><option value="4">4월</option>
            <option value="5">5월</option><option value="6">6월</option>
            <option value="7">7월</option><option value="8">8월</option>
            <option value="9">9월</option><option value="10">10월</option>
            <option value="11">11월</option><option value="12">12월</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="birthDay">출생 일</label>
          <input type="number" id="birthDay" placeholder="예) 15" min="1" max="31" />
        </div>
        <div class="form-group">
          <label for="birthHour">태어난 시 (시진)</label>
          <select id="birthHour">
            <option value="">시진 선택</option>
            <option value="자시(子時)">자시 (子時) — 밤 11시 ~ 새벽 1시</option>
            <option value="축시(丑時)">축시 (丑時) — 새벽 1시 ~ 3시</option>
            <option value="인시(寅時)">인시 (寅時) — 새벽 3시 ~ 5시</option>
            <option value="묘시(卯時)">묘시 (卯時) — 새벽 5시 ~ 7시</option>
            <option value="진시(辰時)">진시 (辰時) — 오전 7시 ~ 9시</option>
            <option value="사시(巳時)">사시 (巳時) — 오전 9시 ~ 11시</option>
            <option value="오시(午時)">오시 (午時) — 오전 11시 ~ 오후 1시</option>
            <option value="미시(未時)">미시 (未時) — 오후 1시 ~ 3시</option>
            <option value="신시(申時)">신시 (申時) — 오후 3시 ~ 5시</option>
            <option value="유시(酉時)">유시 (酉時) — 오후 5시 ~ 7시</option>
            <option value="술시(戌時)">술시 (戌時) — 오후 7시 ~ 9시</option>
            <option value="해시(亥時)">해시 (亥時) — 오후 9시 ~ 11시</option>
            <option value="모름">시진 모름</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="gender">성별</label>
          <select id="gender">
            <option value="">성별 선택</option>
            <option value="남성">남성 (男)</option>
            <option value="여성">여성 (女)</option>
          </select>
        </div>
        <div class="form-group">
          <label for="question">궁금한 점 (선택)</label>
          <input type="text" id="question" placeholder="예) 올해 취업운은 어떤가요?" />
        </div>
      </div>
    </div>

    <!-- ── SUBMIT ── -->
    <button class="btn-submit" id="submitBtn" onclick="getSaju()">
      <span class="btn-inner">
        <span id="btnText">✨ 사주팔자 보기</span>
        <span class="loader" id="loader"></span>
      </span>
    </button>

    <div class="error-box" id="errorBox"></div>

    <!-- ── RESULT ── -->
    <div id="result-section">
      <br/>
      <div class="card fade-in">
        <div class="result-header">
          <span style="font-size:1.5rem">🔮</span>
          <h2>사주팔자 풀이</h2>
        </div>
        <div class="divider">☰ ☱ ☲ ☳</div>
        <div class="result-body" id="resultText"></div>
      </div>
    </div>

  </div>

  <!-- ── FOOTER ── -->
  <div class="footer">
    AI 사주팔자 · Powered by Google Gemini · 본 결과는 참고용이며 실제 운명을 보장하지 않습니다
  </div>

  <script>
    function toggleApiKey() {
      const input = document.getElementById('apiKey');
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    function showError(msg) {
      const box = document.getElementById('errorBox');
      box.textContent = msg;
      box.style.display = 'block';
    }
    function hideError() {
      document.getElementById('errorBox').style.display = 'none';
    }

    function setLoading(on) {
      const btn  = document.getElementById('submitBtn');
      const text = document.getElementById('btnText');
      const spin = document.getElementById('loader');
      btn.disabled = on;
      text.textContent = on ? '점괘를 읽는 중...' : '✨ 사주팔자 보기';
      spin.style.display = on ? 'inline-block' : 'none';
    }

    // 양력 → 천간지지 변환 (간략 버전)
    function getGanjiYear(year) {
      const gan  = ['갑(甲)','을(乙)','병(丙)','정(丁)','무(戊)','기(己)','경(庚)','신(辛)','임(壬)','계(癸)'];
      const ji   = ['자(子)','축(丑)','인(寅)','묘(卯)','진(辰)','사(巳)','오(午)','미(未)','신(申)','유(酉)','술(戌)','해(亥)'];
      return `${gan[(year - 4) % 10]} ${ji[(year - 4) % 12]}`;
    }

    function getGanjiMonth(month) {
      // 월지는 인월(寅)부터 시작
      const ji = ['인(寅)','묘(卯)','진(辰)','사(巳)','오(午)','미(未)','신(申)','유(酉)','술(戌)','해(亥)','자(子)','축(丑)'];
      return ji[(month - 1) % 12];
    }

    async function getSaju() {
      hideError();
      document.getElementById('result-section').style.display = 'none';

      const apiKey = document.getElementById('apiKey').value.trim();
      const year   = parseInt(document.getElementById('birthYear').value);
      const month  = parseInt(document.getElementById('birthMonth').value);
      const day    = parseInt(document.getElementById('birthDay').value);
      const hour   = document.getElementById('birthHour').value;
      const gender = document.getElementById('gender').value;
      const question = document.getElementById('question').value.trim();

      // Validation
      if (!apiKey)              return showError('Gemini API 키를 입력해 주세요.');
      if (!apiKey.startsWith('AIza')) return showError('올바른 Gemini API 키 형식이 아닌 것 같습니다. "AIza..."로 시작하는 키를 확인해 주세요.');
      if (!year || year < 1900 || year > 2025) return showError('올바른 출생 연도를 입력해 주세요. (1900 ~ 2025)');
      if (!month)               return showError('출생 월을 선택해 주세요.');
      if (!day || day < 1 || day > 31) return showError('올바른 출생 일을 입력해 주세요. (1 ~ 31)');
      if (!hour)                return showError('태어난 시진을 선택해 주세요.');
      if (!gender)              return showError('성별을 선택해 주세요.');

      const yearGanji  = getGanjiYear(year);
      const monthGanji = getGanjiMonth(month);

      const prompt = `당신은 한국 전통 사주명리학의 최고 전문가입니다. 아래 정보를 바탕으로 사주팔자를 상세하게 풀이해 주세요.

## 의뢰인 정보
- 성별: ${gender}
- 생년월일: ${year}년 ${month}월 ${day}일
- 태어난 시진: ${hour}
- 연주(年柱): ${yearGanji}년
- 월주(月柱): ${monthGanji}월
${question ? `- 특별히 궁금한 점: ${question}` : ''}

## 풀이 요청 항목
다음 항목들을 순서대로, 각각 소제목을 붙여 상세히 풀이해 주세요:

1. **사주 개요** — 전체적인 사주의 기운과 특징
2. **성격과 기질** — 타고난 성격, 장점과 단점
3. **적성과 직업운** — 어울리는 직업군과 재물운
4. **대인관계와 인연운** — 사람들과의 관계 및 결혼운
5. **건강운** — 주의해야 할 건강 부분
6. **2025~2026년 운세** — 올해와 내년의 주요 운기${question ? `\n7. **특별 질문 답변** — "${question}"에 대한 맞춤 답변` : ''}

마지막에 한 문장으로 핵심 조언을 정리해 주세요.
답변은 한국어로 작성하되, 한자는 괄호 안에 병기해 주세요. 따뜻하고 희망적인 어조를 유지해 주세요.`;

      setLoading(true);

      try {
        const MODEL = 'gemini-2.0-flash-lite';
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${apiKey}`;

        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [{ text: prompt }] }],
            generationConfig: {
              temperature: 0.85,
              maxOutputTokens: 2048,
            }
          })
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          const msg = err?.error?.message || `HTTP ${res.status}`;
          if (res.status === 400) throw new Error(`요청 오류: ${msg}`);
          if (res.status === 403 || res.status === 401) throw new Error('API 키가 유효하지 않거나 권한이 없습니다. 키를 다시 확인해 주세요.');
          if (res.status === 429) throw new Error('요청 한도를 초과했습니다. 잠시 후 다시 시도해 주세요.');
          throw new Error(`API 오류: ${msg}`);
        }

        const data = await res.json();
        const text = data?.candidates?.[0]?.content?.parts?.[0]?.text;
        if (!text) throw new Error('응답을 받지 못했습니다. 다시 시도해 주세요.');

        // Render with basic markdown-like formatting
        const formatted = text
          .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
          .replace(/^##\s+(.+)$/gm, '<br/><strong style="color:var(--light-gold);font-size:1.05rem">$1</strong><br/>')
          .replace(/^#\s+(.+)$/gm,  '<br/><strong style="color:var(--light-gold);font-size:1.1rem">$1</strong><br/>');

        document.getElementById('resultText').innerHTML = formatted;
        const section = document.getElementById('result-section');
        section.style.display = 'block';
        section.scrollIntoView({ behavior: 'smooth', block: 'start' });

      } catch (e) {
        showError('오류가 발생했습니다: ' + e.message);
      } finally {
        setLoading(false);
      }
    }

    // Enter key on question field
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('question').addEventListener('keydown', e => {
        if (e.key === 'Enter') getSaju();
      });
    });
  </script>
</body>
</html>
